name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: fintrackregistrytf.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: fintrackregistrytf.azurecr.io/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: fintrackregistrytf.azurecr.io/frontend:latest

      - name: Deploy backend to Azure Container Apps
        run: |
          az containerapp update \
            --name fintrack-backend-tf \
            --resource-group fintrack-rg-tf \
            --image fintrackregistrytf.azurecr.io/backend:latest

      - name: Deploy frontend to Azure Container Apps
        run: |
          az containerapp update \
            --name fintrack-frontend-tf \
            --resource-group fintrack-rg-tf \
            --image fintrackregistrytf.azurecr.io/frontend:latest

      - name: Verify deployment
        run: |
          echo "Waiting for deployment..."
          sleep 15
          BACKEND_URL=$(az containerapp show \
            --name fintrack-backend-tf \
            --resource-group fintrack-rg-tf \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://$BACKEND_URL/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deployment verification failed"
            exit 1
          fi
          echo "Deployment successful"